<!DOCTYPE html>
<!--
  customers/templates/customers/base.html

  Learning notes
  ──────────────
  This is the base template all other customer templates extend.
  It uses Bootstrap 5 (via CDN) for quick styling — no static files needed.

  {% templatetag openblock %} block {% templatetag closeblock %} tags are the template inheritance mechanism you already know.
  The child templates (list, detail, form, etc.) override these blocks to
  inject their own content.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Customer Manager{% endblock %}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { padding-top: 1.5rem; }
    .note-box { background: #f8f9fa; border-left: 4px solid #0d6efd; padding: .75rem 1rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'customers:customer_list' %}">
      📋 Customer Manager
    </a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link text-white" href="{% url 'customers:customer_list' %}">Customers (HTML)</a>
      <a class="nav-link text-white" href="/api/customers/" target="_blank">API (JSON)</a>
      <a class="nav-link text-white" href="http://localhost:5173" target="_blank">React App</a>
    </div>
  </div>
</nav>

<main class="container">

  <!-- Django messages framework — same as always -->
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}

  {% block content %}{% endblock %}

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
